name: Roshambo Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      player_move:
        description: 'Select your move'
        type: choice # 👈 Changes the text box to a dropdown
        required: true
        default: 'Rock'
        options: # 👈 The allowed list of choices
          - Rock
          - Paper
          - Scissors
      cpu_move:
        description: 'Select CPU move'
        type: choice # 👈 Changes the text box to a dropdown
        required: true
        default: 'Scissors'
        options: # 👈 The allowed list of choices
          - Rock
          - Paper
          - Scissors

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run Tests
        run: |
          P_MOVE="${{ github.event.inputs.player_move }}"
          C_MOVE="${{ github.event.inputs.cpu_move }}"

          # We can keep your validation code here as a fallback,
          # but the GUI will now prevent typos entirely!
          echo "Running custom match: $P_MOVE vs $C_MOVE..."
          result=$(dotnet run -- "$P_MOVE" "$C_MOVE")
          echo "Game Result: $result"
