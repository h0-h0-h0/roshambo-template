name: Roshambo Tests

on:
  push:
    branches: [ main ]
  
  workflow_dispatch: # 👈 This line adds the manual button
    inputs:
      player_move:
        description: 'Enter your move (Rock, Paper, or Scissors)'
        required: true
        default: 'Rock'
      cpu_move:
        description: 'Enter CPU move (Rock, Paper, or Scissors)'
        required: true
        default: 'Scissors'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run Tests
        run: |
          # 1. Store inputs in local script variables for cleaner reading
          P_MOVE="${{ github.event.inputs.player_move }}"
          C_MOVE="${{ github.event.inputs.cpu_move }}"

          # 2. Validate Player Move
          case "$P_MOVE" in
            Rock|Paper|Scissors) ;; # Valid! Do nothing and continue.
            *) echo "ERROR: '$P_MOVE' is not a valid move. Use Rock, Paper, or Scissors."; exit 1 ;;
          esac

          # 3. Validate CPU Move
          case "$C_MOVE" in
            Rock|Paper|Scissors) ;; # Valid! Do nothing and continue.
            *) echo "ERROR: '$C_MOVE' is not a valid move. Use Rock, Paper, or Scissors."; exit 1 ;;
          esac

          # 4. If both passed validation, run the actual game
          echo "Running custom match: $P_MOVE vs $C_MOVE..."
          result=$(dotnet run -- "$P_MOVE" "$C_MOVE")
          echo "Game Result: $result"
          
