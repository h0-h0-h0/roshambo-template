name: Roshambo Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      player_move:
        description: 'Select your move'
        type: choice
        required: true
        default: 'Rock'
        options:
          - Rock
          - Paper
          - Scissors

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Run Tests 
        run: |
          # 1. Grab the user's choice from the GUI dropdown
          P_MOVE="${{ github.event.inputs.player_move }}"

          # 2. Define the available choices in a Bash array
          MOVES=("Rock" "Paper" "Scissors")

          # 3. Calculate a random index (0, 1, or 2)
          RANDOM_INDEX=$(( RANDOM % 3 ))

          # 4. Extract the random move from the array
          C_MOVE=${MOVES[$RANDOM_INDEX]}

          # 5. Execute the game
          echo "Running custom match: $P_MOVE vs $C_MOVE (Randomised CPU)..."
          result=$(dotnet run -- "$P_MOVE" "$C_MOVE")
          echo "Game Result: $result"
